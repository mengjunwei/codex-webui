# Codex WebUI —— Docker 单容器部署。
#
# 后端只从 config.toml 读取业务配置（不读业务环境变量），故需把宿主机 ./config.toml
# 挂载进容器。PostgreSQL / Redis 为**外部依赖**，在 config.toml 的 [database]/[redis] 填连接。
#
# 使用：
#   cp backend-rs/config.toml.example config.toml   # 编辑 [database]/[redis]/webui_api_key 等
#   docker compose up -d --build
#
# 多机集群部署见 docs/cluster-deploy.md。

services:
  codex-webui:
    build:
      context: .
      args:
        CODEX_CLI_VERSION: "0.142.5"
    # image: ghcr.io/limlll/codex-webui:latest
    ports:
      - "${PORT:-8172}:8172"
    environment:
      # 后端定位 config.toml（仅路径查找用，后端会读这两个 env）
      CODEX_WEBUI_CONFIG: /etc/codex-webui/config.toml
      CODEX_HOME: /root/.codex-webui/home
    volumes:
      - ./config.toml:/etc/codex-webui/config.toml:ro
      - root_home:/root
      - workspaces:/workspaces
    # Codex sandbox（bubblewrap）需要 user namespace + mount 能力
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    restart: unless-stopped

volumes:
  root_home:
  workspaces:
